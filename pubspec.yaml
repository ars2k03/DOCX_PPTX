name: mcq_ppt_desktop
version: 1.0.0+1
publish_to: 'none'
description: Flutter desktop app for converting DOCX MCQs into PPTX presentations.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  file_picker: ^8.1.7
  path: ^1.9.0
  window_manager: ^0.4.3
  shared_preferences: ^2.5.5
  firebase_core: ^4.8.0
  cloud_firestore: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
